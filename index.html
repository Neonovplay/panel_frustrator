<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0b10">
<title>Frustrator · Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0b10;
  --surface: #13131e;
  --card: #181825;
  --border: #222233;
  --accent: #6c63ff;
  --accent-dim: rgba(108,99,255,.12);
  --green: #3ddc84;
  --green-dim: rgba(61,220,132,.12);
  --red: #ff5555;
  --red-dim: rgba(255,85,85,.12);
  --yellow: #ffd166;
  --yellow-dim: rgba(255,209,102,.12);
  --blue: #6c8fff;
  --text: #e0e0f0;
  --muted: #555570;
  --faint: #2a2a3a;
  --font: 'JetBrains Mono', monospace;
  --r: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(108,99,255,.04) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 3rem 1.5rem 5rem;
}

/* HEADER */
.header {
  margin-bottom: 2.5rem;
}

.header-title {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--text);
}

.header-title .dot {
  color: var(--accent);
  margin: 0 .3rem;
  opacity: .7;
}

.header-sub {
  margin-top: .4rem;
  font-size: .78rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* OVERALL */
.overall {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.1rem 1.4rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  border-radius: var(--r);
  margin-bottom: 1.5rem;
  transition: border-color .2s;
}

.overall.is-down { border-left-color: var(--red); }
.overall.is-warn { border-left-color: var(--yellow); }

.overall-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}

.overall.is-down .overall-dot { background: var(--red); box-shadow: 0 0 10px var(--red); }
.overall.is-warn .overall-dot { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .4; }
}

.overall-text { flex: 1; }

.overall-headline {
  font-size: .9rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text);
}

.overall-meta {
  font-size: .7rem;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: .2rem;
}

/* SERVICES */
.services {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}

.service {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 2px solid var(--faint);
  border-radius: var(--r);
  padding: .9rem 1.1rem;
  transition: background .15s, border-color .15s;
}

.service:hover { background: var(--card); }

.service.is-up { border-left-color: var(--green); }
.service.is-down { border-left-color: var(--red); }
.service.is-degraded { border-left-color: var(--yellow); }

.svc-head {
  display: grid;
  grid-template-columns: 8px 1fr auto;
  gap: .8rem;
  align-items: center;
}

.svc-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--faint);
  flex-shrink: 0;
}

.service.is-up .svc-dot { background: var(--green); box-shadow: 0 0 6px var(--green-dim); }
.service.is-down .svc-dot { background: var(--red); box-shadow: 0 0 6px var(--red-dim); animation: pulse 1.2s ease-in-out infinite; }
.service.is-degraded .svc-dot { background: var(--yellow); box-shadow: 0 0 6px var(--yellow-dim); }

.svc-info { min-width: 0; }

.svc-name {
  font-size: .88rem;
  font-weight: 500;
  color: var(--text);
  letter-spacing: .5px;
}

.svc-desc {
  font-size: .7rem;
  color: var(--muted);
  margin-top: .1rem;
}

.svc-meta {
  text-align: right;
  flex-shrink: 0;
}

.svc-status {
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}

.service.is-up .svc-status { color: var(--green); }
.service.is-down .svc-status { color: var(--red); }
.service.is-degraded .svc-status { color: var(--yellow); }

.svc-uptime {
  font-size: .68rem;
  color: var(--muted);
  margin-top: .1rem;
}

/* UPTIME BARS */
.bars-wrap {
  margin-top: .75rem;
  padding-top: .6rem;
  border-top: 1px solid var(--border);
}

.bars-track {
  display: grid;
  grid-template-columns: repeat(90, 1fr);
  gap: 2px;
  height: 24px;
}

.bar {
  border-radius: 1px;
  background: var(--faint);
  cursor: default;
  position: relative;
  transition: filter .1s, transform .1s;
}

.bar:hover { filter: brightness(1.4); transform: scaleY(1.2); }

.bar.good { background: var(--green); opacity: .7; }
.bar.warn { background: var(--yellow); opacity: .8; }
.bar.bad  { background: var(--red); opacity: .9; }
.bar.none { background: var(--faint); opacity: .4; }

.bar::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: .65rem;
  padding: .25rem .5rem;
  border-radius: 3px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity .1s;
  z-index: 10;
}

.bar:hover::after { opacity: 1; }

.bars-axis {
  display: flex;
  justify-content: space-between;
  margin-top: .4rem;
  font-size: .62rem;
  color: var(--faint);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.bars-axis-line {
  flex: 1;
  height: 1px;
  background: var(--border);
  margin: 0 .5rem;
  align-self: center;
}

/* RESPONSE TIME */
.svc-time {
  font-size: .68rem;
  color: var(--muted);
  margin-top: .1rem;
}

/* FOOTER */
.footer {
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.footer-left {
  font-size: .72rem;
  color: var(--muted);
  letter-spacing: 1px;
}

.refresh-btn {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  padding: .4rem .9rem;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-family: var(--font);
  font-size: .7rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: color .15s, border-color .15s;
}

.refresh-btn:hover { color: var(--accent); border-color: var(--accent); }
.refresh-btn:disabled { opacity: .4; cursor: wait; }

.spin { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--card) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: var(--r);
  height: 72px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

@media (max-width: 480px) {
  .svc-head { grid-template-columns: 8px 1fr; }
  .svc-meta { grid-column: 1 / -1; display: flex; justify-content: space-between; padding-top: .4rem; border-top: 1px dashed var(--border); }
  .bars-track { grid-template-columns: repeat(30, 1fr); }
  .bar:nth-child(-n+60) { display: none; }
}
</style>
</head>
<body>
<div class="wrap">
  <header class="header">
    <h1 class="header-title">FRUSTRATOR<span class="dot">·</span>STATUS</h1>
    <p class="header-sub">Мониторинг серверов и сервисов</p>
  </header>

  <div id="overall" class="overall">
    <div class="overall-dot"></div>
    <div class="overall-text">
      <div class="overall-headline">Загрузка...</div>
      <div class="overall-meta">обновление каждые 60 секунд</div>
    </div>
  </div>

  <div id="services" class="services">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <footer class="footer">
    <span class="footer-left" id="updated">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <svg id="refreshIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
      </svg>
      Обновить
    </button>
  </footer>
</div>

<script>
const SUMMARY_URL = 'https://raw.githubusercontent.com/Neonovplay/panel_frustrator/master/history/summary.json';
const HISTORY_BASE = 'https://raw.githubusercontent.com/Neonovplay/panel_frustrator/master/history/';

const SERVICE_NAMES = {
  'vpn-panel': { name: 'VPN Panel', desc: 'Панель управления и мониторинга' },
};

let loading = false;

function statusClass(s) {
  if (s === 'up') return 'is-up';
  if (s === 'down') return 'is-down';
  return 'is-degraded';
}

function statusLabel(s) {
  if (s === 'up') return 'работает';
  if (s === 'down') return 'недоступен';
  return 'деградация';
}

function parseYmlHistory(text) {
  const entries = [];
  const blocks = text.split(/^---$/m).filter(b => b.trim());
  for (const block of blocks) {
    const dateMatch = block.match(/- date:\s*['"]?(\d{4}-\d{2}-\d{2})['"]?/);
    const statusMatch = block.match(/status:\s*['"]?(\w+)['"]?/);
    if (dateMatch && statusMatch) {
      entries.push({ date: dateMatch[1], status: statusMatch[1] });
    }
  }
  return entries;
}

function buildBars(history) {
  const today = new Date();
  const bars = [];
  for (let i = 89; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().slice(0, 10);
    const entry = history.find(h => h.date === dateStr);
    let cls = 'none';
    let tip = dateStr + ' · нет данных';
    if (entry) {
      cls = entry.status === 'up' ? 'good' : entry.status === 'degraded' ? 'warn' : 'bad';
      tip = dateStr + ' · ' + statusLabel(entry.status);
    }
    bars.push(`<span class="bar ${cls}" data-tip="${tip}"></span>`);
  }
  return bars.join('');
}

async function fetchHistory(slug) {
  try {
    const r = await fetch(HISTORY_BASE + slug + '.yml', { cache: 'no-store' });
    if (!r.ok) return [];
    const text = await r.text();
    return parseYmlHistory(text);
  } catch { return []; }
}

async function loadData() {
  if (loading) return;
  loading = true;
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.classList.add('spin');

  try {
    const r = await fetch(SUMMARY_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error('fetch failed');
    const data = await r.json();

    // Overall status
    const anyDown = data.some(s => s.status === 'down');
    const anyDeg = data.some(s => s.status === 'degraded');
    const overall = document.getElementById('overall');
    overall.className = 'overall' + (anyDown ? ' is-down' : anyDeg ? ' is-warn' : '');
    const headline = anyDown ? `Проблемы: ${data.filter(s=>s.status==='down').length} сервис не отвечает`
      : anyDeg ? 'Деградация производительности'
      : 'Все системы работают';
    overall.innerHTML = `
      <div class="overall-dot"></div>
      <div class="overall-text">
        <div class="overall-headline">${headline}</div>
        <div class="overall-meta">обновлено ${new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'})} · автообновление каждые 60 сек</div>
      </div>`;

    // Services
    const container = document.getElementById('services');
    container.innerHTML = '';

    for (const svc of data) {
      const meta = SERVICE_NAMES[svc.slug] || { name: svc.name, desc: svc.url };
      const history = await fetchHistory(svc.slug);
      const bars = buildBars(history);
      const uptime = parseFloat(svc.uptimeMonth || svc.uptime || '0').toFixed(2);
      const time = svc.time ? `${svc.time} ms` : '—';

      const div = document.createElement('article');
      div.className = 'service ' + statusClass(svc.status);
      div.innerHTML = `
        <div class="svc-head">
          <div class="svc-dot"></div>
          <div class="svc-info">
            <div class="svc-name">${meta.name}</div>
            <div class="svc-desc">${meta.desc}</div>
          </div>
          <div class="svc-meta">
            <div class="svc-status">${statusLabel(svc.status)}</div>
            <div class="svc-uptime">uptime ${uptime}%</div>
            <div class="svc-time">${time}</div>
          </div>
        </div>
        ${bars ? `<div class="bars-wrap">
          <div class="bars-track">${bars}</div>
          <div class="bars-axis">
            <span>90 дней назад</span>
            <span class="bars-axis-line"></span>
            <span>сегодня</span>
          </div>
        </div>` : ''}`;
      container.appendChild(div);
    }

    document.getElementById('updated').textContent =
      'обновлено ' + new Date().toLocaleString('ru', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});

  } catch (e) {
    console.error(e);
    document.getElementById('overall').innerHTML = `
      <div class="overall-dot" style="background:var(--yellow);box-shadow:0 0 10px var(--yellow)"></div>
      <div class="overall-text">
        <div class="overall-headline">Не удалось загрузить данные</div>
        <div class="overall-meta">проверьте подключение или попробуйте позже</div>
      </div>`;
  } finally {
    loading = false;
    btn.disabled = false;
    icon.classList.remove('spin');
  }
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
