name: Deploy Custom Status Page

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Download status page
        run: |
          curl -o index.html https://raw.githubusercontent.com/Neonovplay/panel_frustrator/master/status-page.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update custom status page"
          git push
